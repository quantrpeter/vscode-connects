<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  body {
    font-family: var(--vscode-font-family);
    color: var(--vscode-foreground);
    display: flex;
    justify-content: center;
    padding-top: 32px;
  }
  .card {
    width: 650px;
    background: var(--vscode-editorWidget-background);
    border: 1px solid var(--vscode-editorWidget-border, transparent);
    border-radius: 6px;
    padding: 24px 28px;
  }
  h2 { margin-top: 0; font-weight: 500; }
  label { display: block; margin: 14px 0 4px; font-size: 12px; opacity: 0.9; }
  input:not([type="checkbox"]) {
    width: 100%;
    box-sizing: border-box;
    padding: 6px 8px;
    background: var(--vscode-input-background);
    color: var(--vscode-input-foreground);
    border: 1px solid var(--vscode-input-border, transparent);
    border-radius: 3px;
    outline: none;
  }
  input:focus { border-color: var(--vscode-focusBorder); }
  input[type="checkbox"] {
    width: 14px;
    height: 14px;
    padding: 0;
    margin: 0;
    flex: 0 0 auto;
    vertical-align: middle;
  }

  .checkbox-row {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 8px 0 4px;
    font-size: 12px;
    width: auto;
  }
  .row { display: flex; gap: 12px; }
  .row .grow { flex: 1; }
  .row .port { width: 90px; }
  .buttons { display: flex; gap: 8px; margin-top: 24px; justify-content: flex-end; }
  button {
    padding: 6px 16px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    background: var(--vscode-button-secondaryBackground);
    color: var(--vscode-button-secondaryForeground);
  }
  button.primary {
    background: var(--vscode-button-background);
    color: var(--vscode-button-foreground);
  }
  button:hover { opacity: 0.9; }
  .hint { font-size: 11px; opacity: 0.7; margin-top: 16px; line-height: 1.5; }
  .error { color: var(--vscode-errorForeground); font-size: 12px; margin-top: 10px; min-height: 16px; }
  .banner {
    width: calc(100% + 56px);
    max-width: none;
    margin: -24px -28px 16px -28px;
    border-radius: 6px 6px 0 0;
    display: block;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="banner" src="{{bannerUri}}" alt="VSCode Connect SSH banner" />
    <h2>{{title}}</h2>
    <label for="name">Session name</label>
    <input id="name" placeholder="My server" value="{{name}}" />
    <div class="row">
      <div class="grow">
        <label for="host">Host name or IP</label>
        <input id="host" placeholder="example.com" value="{{host}}" />
      </div>
      <div class="port">
        <label for="port">Port</label>
        <input id="port" type="number" value="{{port}}" />
      </div>
    </div>
    <label for="username">Username</label>
    <input id="username" placeholder="root" value="{{username}}" />
    <label for="password">Password (optional)</label>
    <input id="password" type="password" placeholder="Leave empty to use SSH agent / keys" value="{{password}}" />

    <label for="group">Group (optional)</label>
    <input id="group" placeholder="e.g. Production, Staging, Home" value="{{group}}" />

    <label for="privateKey" style="margin-top:12px;">Private key / certificate (PEM, optional)</label>
    <div style="display:flex; gap:8px; align-items:center;">
      <button type="button" id="pickKey">Choose key file…</button>
      <span id="keyName" style="font-size:12px; opacity:0.8; flex:1; word-break:break-all;"></span>
      <button type="button" id="clearKey" style="padding:2px 8px; font-size:11px;">Remove</button>
    </div>
    <input id="privateKey" type="hidden" />
    <input id="keyFile" type="file" accept=".pem,.key,.ppk,text/plain,application/x-pem-file" style="display:none" />

    <label for="passphrase">Key passphrase (if the private key is encrypted)</label>
    <input id="passphrase" type="password" placeholder="Leave empty if key is not encrypted" value="{{passphrase}}" />

    <label class="checkbox-row">
      <input id="keepAlive" type="checkbox" {{keepAliveChecked}} /> Keep alive (prevent idle disconnects)
    </label>

    <div class="error" id="error"></div>
    <div class="buttons">
      <button id="cancel">Cancel</button>
      <button id="save">Save</button>
      <button id="saveConnect" class="primary">Save &amp; Connect</button>
    </div>
    <div class="hint">
      Hosts are saved to your VS Code profile. To see them on other computers:
      sign in with GitHub (or Microsoft) and turn on Settings Sync, then select
      "Extensions" (or "All"). Passwords and private keys are stored as part of the synced data.
    </div>
  </div>
  <script>
    const vscode = acquireVsCodeApi();
    const $ = (id) => document.getElementById(id);

    // Private key file handling
    const pickBtn = $('pickKey');
    const clearBtn = $('clearKey');
    const keyFile = $('keyFile');
    const keyName = $('keyName');
    const pkHidden = $('privateKey');

    const HAS_EXISTING_KEY = '{{hasPrivateKey}}' === 'true';

    function setKeyIndicator(text, isExistingMarker = false) {
      keyName.textContent = text || '';
      clearBtn.style.display = (text || isExistingMarker) ? '' : 'none';
    }

    // If editing and a key already exists, show a placeholder (content is kept server-side)
    // Use a marker so the backend knows to keep the existing key unless user replaces or removes.
    if (pkHidden && HAS_EXISTING_KEY) {
      pkHidden.value = '__EXISTING__';
      setKeyIndicator('(key/certificate saved — choose a new file to replace)', true);
    } else {
      clearBtn.style.display = 'none';
    }

    pickBtn.addEventListener('click', () => keyFile.click());

    keyFile.addEventListener('change', async () => {
      const f = keyFile.files && keyFile.files[0];
      if (!f) return;
      const text = await f.text();
      pkHidden.value = text;
      setKeyIndicator(f.name + ' (' + text.length + ' bytes)');
      // When user picks a new key, clear any previously stored passphrase in the form
      // so they can enter a fresh one if needed.
      const pp = $('passphrase');
      if (pp) pp.value = '';
    });

    clearBtn.addEventListener('click', () => {
      pkHidden.value = '';
      keyFile.value = '';
      setKeyIndicator('');
      // Also clear passphrase when removing the key
      const pp = $('passphrase');
      if (pp) pp.value = '';
    });

    function submit(connectAfterSave) {
      const name = $('name').value.trim() || $('host').value.trim();
      const host = $('host').value.trim();
      const username = $('username').value.trim();
      if (!host || !username) {
        $('error').textContent = 'Host and username are required.';
        return;
      }
      vscode.postMessage({
        type: 'save',
        connectAfterSave,
        name,
        host,
        port: parseInt($('port').value, 10) || 22,
        username,
        password: $('password').value,
        privateKey: $('privateKey').value || undefined,
        passphrase: $('passphrase').value || undefined,
        keepAlive: $('keepAlive').checked,
        group: $('group').value || undefined,
      });
    }

    $('save').addEventListener('click', () => submit(false));
    $('saveConnect').addEventListener('click', () => submit(true));
    $('cancel').addEventListener('click', () => vscode.postMessage({ type: 'cancel' }));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.tagName === 'INPUT') submit(false);
    });
    $('{{focusId}}').focus();
  </script>
</body>
</html>
