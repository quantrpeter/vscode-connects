<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  body {
    font-family: var(--vscode-font-family);
    color: var(--vscode-foreground);
    padding: 8px 10px;
    user-select: none;
  }
  input {
    width: 100%;
    box-sizing: border-box;
    padding: 5px 8px;
    background: var(--vscode-input-background);
    color: var(--vscode-input-foreground);
    border: 1px solid var(--vscode-input-border, transparent);
    border-radius: 3px;
    outline: none;
  }
  input:focus { border-color: var(--vscode-focusBorder); }
  .buttons { display: flex; gap: 6px; margin-top: 8px; }
  button {
    flex: 1;
    padding: 5px 0;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    background: var(--vscode-button-secondaryBackground);
    color: var(--vscode-button-secondaryForeground);
  }
  button.primary {
    background: var(--vscode-button-background);
    color: var(--vscode-button-foreground);
  }
  button:hover { opacity: 0.9; }
  .list { margin: 8px -4px 0; }
  .item {
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
  }
  .item:hover { background: var(--vscode-list-hoverBackground); }
  .item.selected {
    background: var(--vscode-list-activeSelectionBackground);
    color: var(--vscode-list-activeSelectionForeground);
  }
  .item .detail { font-size: 11px; opacity: 0.35; }
  .empty {
    margin-top: 14px;
    font-size: 12px;
    opacity: 0.7;
    text-align: center;
    line-height: 1.5;
  }
  .buttons.secondary {
    margin-top: 4px;
  }
  .buttons.secondary button {
    flex: 1;
    font-size: 11px;
    padding: 3px 0;
  }
  .group-header {
    margin-top: 10px;
    padding: 2px 4px;
    font-size: 11px;
    font-weight: 600;
    opacity: 0.85;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .group-header::before {
    content: '▼';
    display: inline-block;
    width: 1em;
    font-size: 9px;
    opacity: 0.7;
  }
  .group-header.collapsed::before {
    content: '▶';
  }
  .group-header .count {
    opacity: 0.6;
    font-weight: normal;
    font-size: 11px;
  }
  .group-items {
    margin-left: 6px;
  }
  .item .group-badge {
    margin-left: 6px;
    font-size: 10px;
    opacity: 0.5;
  }
</style>
</head>
<body>
  <input id="search" type="text" placeholder="Search hosts..." value="{{filter}}" />
  <div class="buttons">
    <button id="add" class="primary">Add</button>
    <button id="edit">Edit</button>
    <button id="delete">Delete</button>
  </div>
  <div class="buttons secondary">
    <button id="export">Export JSON</button>
    <button id="import">Import JSON</button>
  </div>
  <div class="list" id="list"></div>
  <script>
    const vscode = acquireVsCodeApi();
    const search = document.getElementById('search');
    const list = document.getElementById('list');
    let hosts = [];
    let selectedId = null;
    let collapsed = new Set();
    let filterActive = false;

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function render() {
      list.textContent = '';
      if (hosts.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = search.value
          ? 'No hosts match your search.'
          : 'No SSH hosts yet. Click Add to create one.\nHosts sync across machines when you are signed in and Settings Sync is enabled (select "Extensions").';
        list.appendChild(empty);
        return;
      }

      // Group hosts by their group field ('' => Ungrouped)
      const groups = new Map();
      for (const h of hosts) {
        const g = h.group || '';
        if (!groups.has(g)) groups.set(g, []);
        groups.get(g).push(h);
      }

      // Sort groups alphabetically; put Ungrouped (empty) last
      const groupNames = Array.from(groups.keys()).sort((a, b) => {
        if (!a) return 1;
        if (!b) return -1;
        return a.localeCompare(b);
      });

      for (const g of groupNames) {
        const items = groups.get(g) || [];
        const isCollapsed = collapsed.has(g) && !filterActive;

        // Clickable group header with chevron
        const header = document.createElement('div');
        header.className = 'group-header' + (isCollapsed ? ' collapsed' : '');
        const label = g || 'Ungrouped';
        header.innerHTML =
          `<span>${escapeHtml(label)}</span><span class="count">(${items.length})</span>`;
        header.addEventListener('click', () => {
          if (filterActive) return;
          // Optimistic toggle for snappy feel; extension will confirm via refresh
          if (collapsed.has(g)) collapsed.delete(g); else collapsed.add(g);
          vscode.postMessage({ type: 'toggleGroup', group: g });
          render();
        });
        list.appendChild(header);

        if (isCollapsed) continue;

        const container = document.createElement('div');
        container.className = 'group-items';

        for (const h of items) {
          const item = document.createElement('div');
          item.className = 'item' + (h.id === selectedId ? ' selected' : '');
          const name = document.createElement('div');
          name.textContent = h.name;
          const detail = document.createElement('div');
          detail.className = 'detail';
          detail.textContent = h.detail;
          item.append(name, detail);
          item.addEventListener('click', () => {
            selectedId = h.id;
            render();
          });
          item.addEventListener('dblclick', () =>
            vscode.postMessage({ type: 'connect', id: h.id })
          );
          container.appendChild(item);
        }
        list.appendChild(container);
      }
    }

    search.addEventListener('input', () =>
      vscode.postMessage({ type: 'search', value: search.value })
    );
    document.getElementById('add').addEventListener('click', () =>
      vscode.postMessage({ type: 'add' })
    );
    document.getElementById('edit').addEventListener('click', () =>
      vscode.postMessage({ type: 'edit', id: selectedId })
    );
    document.getElementById('delete').addEventListener('click', () =>
      vscode.postMessage({ type: 'delete', id: selectedId })
    );
    document.getElementById('export').addEventListener('click', () =>
      vscode.postMessage({ type: 'export' })
    );
    document.getElementById('import').addEventListener('click', () =>
      vscode.postMessage({ type: 'import' })
    );

    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (msg.type === 'hosts') {
        hosts = Array.isArray(msg.hosts) ? msg.hosts : [];
        const inc = Array.isArray(msg.collapsedGroups) ? msg.collapsedGroups : [];
        collapsed = new Set(inc);
        filterActive = !!msg.filterActive;
        if (selectedId && !hosts.some((h) => h.id === selectedId)) {
          selectedId = null;
        }
        render();
      } else if (msg.type === 'setSearch') {
        search.value = msg.value;
      }
    });

    vscode.postMessage({ type: 'ready' });
  </script>
</body>
</html>
